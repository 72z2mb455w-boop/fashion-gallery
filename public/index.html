<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Fashion Gallery</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--surface:#111;--border:#1e1e1e;--text:#e0e0e0;--muted:#555;--dim:#2a2a2a;--green:#4ade80;--red:#f87171}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;min-height:100vh;-webkit-text-size-adjust:100%}
.header{padding:20px 16px 14px;border-bottom:1px solid var(--border)}
.eyebrow{font-size:8px;letter-spacing:3px;color:var(--dim);font-weight:700;text-transform:uppercase;margin-bottom:3px}
h1{font-size:20px;font-weight:700;margin-bottom:14px}
.sr{display:flex;gap:8px}
textarea{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-size:14px;font-family:inherit;border-radius:3px;resize:none;outline:none;line-height:1.5;-webkit-appearance:none}
textarea::placeholder{color:#2e2e2e}
#sb{background:var(--dim);color:#555;border:none;padding:0 18px;font-size:10px;font-weight:700;letter-spacing:1px;border-radius:3px;cursor:not-allowed;min-width:80px;font-family:inherit;white-space:nowrap}
#sb.r{background:var(--text);color:#000;cursor:pointer}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:none;border:1px solid #1a1a1a;color:#383838;padding:4px 10px;font-size:9px;border-radius:2px;cursor:pointer;font-family:inherit}
.chip:active{color:#666;border-color:#333}
.view{display:none}.view.on{display:block}
.cen{padding:60px 16px;text-align:center}
.bi{font-size:36px;margin-bottom:12px}
.ct{font-size:14px;color:#3a3a3a;margin-bottom:4px}
.cs{font-size:11px;color:var(--dim)}
.spin{width:28px;height:28px;border:2px solid #1a1a1a;border-top-color:#555;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
#sm{font-size:12px;color:#3a3a3a;margin-bottom:4px}
.err{margin:16px;padding:12px 14px;background:#0e0808;border:1px solid #2a1515;border-radius:3px;font-size:12px;color:var(--red);display:none}
.err.on{display:block}
.toolbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:9px 16px;display:none;align-items:center;gap:7px;flex-wrap:wrap}
.toolbar.on{display:flex}
.tc{font-size:9px;color:#333;margin-right:2px}
.fi{background:var(--surface);border:1px solid var(--border);color:#bbb;padding:5px 9px;font-size:10px;border-radius:2px;outline:none;width:100px;font-family:inherit}
.fi::placeholder{color:#2e2e2e}
.tb{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:5px 10px;font-size:9px;font-weight:700;letter-spacing:.8px;border-radius:2px;cursor:pointer;text-transform:uppercase;font-family:inherit;white-space:nowrap}
.tb:disabled{color:#252525;cursor:default}
.tb.ml{margin-left:auto}
.tb.g{color:var(--green);border-color:#1e3a1e}
.gal{padding:12px 14px 80px;display:none}
.gal.on{display:block}
.grid{columns:155px 4;column-gap:10px}
@media(max-width:420px){.grid{columns:2;column-gap:8px}}
@media(min-width:900px){.grid{columns:190px 5}}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:2px;overflow:hidden;cursor:pointer;break-inside:avoid;margin-bottom:10px;position:relative;transition:border-color .15s;user-select:none}
.card.sel{border-color:var(--text)}
.card.hide{display:none}
.chk{position:absolute;top:7px;right:7px;width:20px;height:20px;background:rgba(0,0,0,.7);border:1.5px solid rgba(255,255,255,.15);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#000;z-index:3}
.card.sel .chk{background:var(--text);border-color:var(--text)}
.bt{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.08);border-radius:2px;padding:2px 6px;font-size:8px;font-weight:700;letter-spacing:1.2px;color:#aaa;text-transform:uppercase;z-index:3}
.iw{aspect-ratio:3/4;background:#181818;position:relative;overflow:hidden}
.iw img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .3s}
.iw img.ok{opacity:1}
.iph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.ms{width:18px;height:18px;border:2px solid #222;border-top-color:#555;border-radius:50%;animation:spin .8s linear infinite}
.iph.err .ms{display:none}
.iph.err::after{content:"No image";font-size:8px;color:#2a2a2a}
.ci{padding:8px 10px 4px;display:flex;gap:6px;align-items:flex-start}
.cm{flex:1;min-width:0}
.cn{font-size:10px;font-weight:600;color:#ccc;line-height:1.3;text-transform:uppercase;letter-spacing:.2px;margin-bottom:2px}
.cp{font-size:10px;color:var(--muted)}
.sl{flex-shrink:0;font-size:9px;color:#3a3a3a;text-decoration:none;border:1px solid #1e1e1e;padding:3px 7px;border-radius:2px;white-space:nowrap}
.sl:hover{color:#666;border-color:#333}
.svb{display:block;width:calc(100% - 20px);margin:4px 10px 10px;padding:8px;background:#0a1a0a;border:1px solid #1a3a1a;border-radius:2px;color:var(--green);font-size:10px;font-weight:700;letter-spacing:.8px;text-align:center;cursor:pointer;font-family:inherit}
.svb:active{opacity:.7}
</style>
</head>
<body>
<div class="header">
  <div class="eyebrow">AI Fashion Research</div>
  <h1>Product Gallery</h1>
  <div class="sr">
    <textarea id="p" rows="2" placeholder='e.g. "Graphic tees from Celine, Loewe and Jacquemus"'></textarea>
    <button id="sb" onclick="ds()">SEARCH</button>
  </div>
  <div class="chips" id="ch">
    <button class="chip" onclick="uc(this)">Graphic tees from Celine, Loewe and Jacquemus</button>
    <button class="chip" onclick="uc(this)">Knitwear from Bottega Veneta and The Row</button>
    <button class="chip" onclick="uc(this)">Outerwear from Stone Island and CP Company</button>
    <button class="chip" onclick="uc(this)">Sneakers from Salehe Bembury and New Balance</button>
  </div>
</div>
<div class="view on" id="vi"><div class="cen"><div class="bi">🔍</div><div class="ct">Describe what you're looking for</div><div class="cs">Brands, categories, colours, price ranges</div></div></div>
<div class="view" id="vs"><div class="cen"><div class="spin"></div><div id="sm">Searching…</div><div class="cs">Usually 20–40 seconds</div></div></div>
<div class="view" id="ve"><div class="cen"><div class="bi">◻</div><div class="ct">No products found</div><div class="cs">Try rephrasing</div></div></div>
<div class="err" id="er"></div>
<div class="toolbar" id="tb">
  <span class="tc" id="tc"></span>
  <input class="fi" id="fi" placeholder="Filter…" oninput="fc()">
  <button class="tb" onclick="sa()">All</button>
  <button class="tb" id="nb" onclick="sn()" disabled>None</button>
  <button class="tb" id="cb" onclick="cl()" style="display:none">Copy links</button>
  <button class="tb ml" onclick="rs()">← New</button>
</div>
<div class="gal" id="gl"><div class="grid" id="gr"></div></div>
<script>
var pr=[],sel=new Set(),bz=false;
var pe=document.getElementById("p"),btn=document.getElementById("sb"),er=document.getElementById("er"),tb=document.getElementById("tb"),gl=document.getElementById("gl"),gr=document.getElementById("gr"),tc=document.getElementById("tc"),nb=document.getElementById("nb"),cb=document.getElementById("cb"),sm=document.getElementById("sm");
pe.addEventListener("input",function(){btn.className=(pe.value.trim()&&!bz)?"r":"";});
pe.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();ds();}});
function uc(el){pe.value=el.textContent;btn.className="r";}
function sv(id){["vi","vs","ve"].forEach(function(v){document.getElementById(v).className="view"+(v===id?" on":"");});tb.className="toolbar"+(id==="dn"?" on":"");gl.className="gal"+(id==="dn"?" on":"");er.className="err";}
function se(msg){sv("vi");er.className="err on";er.textContent="⚠ "+msg;}
async function ds(){var p=pe.value.trim();if(!p||bz)return;bz=true;btn.className="";btn.textContent="…";sel.clear();pr=[];sv("vs");er.className="err";document.getElementById("ch").style.display="none";
try{sm.textContent="Searching…";var res=await fetch("/api/search",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:p})});var data=await res.json();if(!res.ok)throw new Error(data.error||"Server error "+res.status);pr=data.products||[];if(pr.length===0){sv("ve");return;}bg();sv("dn");tc.textContent=pr.length+" product"+(pr.length!==1?"s":"");}
catch(e){se(e.message);}finally{bz=false;btn.className=pe.value.trim()?"r":"";btn.textContent="SEARCH";}}
function bg(){gr.innerHTML="";document.getElementById("fi").value="";pr.forEach(function(p,i){var is=p.imageUrl?"/api/image?url="+encodeURIComponent(p.imageUrl):"";var c=document.createElement("div");c.className="card";c.dataset.i=i;c.dataset.q=((p.name||"")+" "+(p.brand||"")).toLowerCase();c.onclick=function(){tg(i);};
c.innerHTML='<div class="chk"></div><div class="bt">'+ex(p.brand)+'</div><div class="iw"><div class="iph" id="ph'+i+'"><div class="ms"></div></div>'+(is?'<img src="'+is+'" onload="il(this,'+i+')" onerror="ie('+i+')">':'')+'</div><div class="ci"><div class="cm"><div class="cn">'+ex(p.name)+'</div>'+(p.price?'<div class="cp">'+ex(p.price)+'</div>':'')+'</div>'+(p.productUrl?'<a class="sl" href="'+ex(p.productUrl)+'" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">Shop ↗</a>':'')+'</div>'+(is?'<button class="svb" onclick="saveImg(event,'+i+')">⬇ Save Image</button>':'');
gr.appendChild(c);});}
function il(img,i){img.className="ok";var ph=document.getElementById("ph"+i);if(ph)ph.style.display="none";}
function ie(i){var ph=document.getElementById("ph"+i);if(ph)ph.className="iph err";}
function saveImg(e,i){e.stopPropagation();var p=pr[i];if(!p||!p.imageUrl)return;var a=document.createElement("a");a.href="/api/image?url="+encodeURIComponent(p.imageUrl);a.download=(p.brand+"-"+p.name).replace(/[^a-z0-9]+/gi,"-").toLowerCase()+".jpg";a.target="_blank";document.body.appendChild(a);a.click();document.body.removeChild(a);}
function tg(i){var c=document.querySelector(".card[data-i='"+i+"']");if(!c)return;if(sel.has(i)){sel.delete(i);c.classList.remove("sel");c.querySelector(".chk").textContent="";}else{sel.add(i);c.classList.add("sel");c.querySelector(".chk").textContent="✓";}us();}
function us(){var n=sel.size;nb.disabled=n===0;cb.style.display=n>0?"inline-flex":"none";cb.textContent="Copy "+n+" link"+(n!==1?"s":"");cb.className="tb";}
function sa(){document.querySelectorAll(".card:not(.hide)").forEach(function(c){var i=parseInt(c.dataset.i);sel.add(i);c.classList.add("sel");c.querySelector(".chk").textContent="✓";});us();}
function sn(){sel.clear();document.querySelectorAll(".card").forEach(function(c){c.classList.remove("sel");c.querySelector(".chk").textContent="";});us();}
function fc(){var q=document.getElementById("fi").value.toLowerCase().trim();document.querySelectorAll(".card").forEach(function(c){c.classList.toggle("hide",!(!q||c.dataset.q.indexOf(q)!==-1));});}
function cl(){var u=[];sel.forEach(function(i){if(pr[i]&&pr[i].productUrl)u.push(pr[i].productUrl);});if(!u.length)return;navigator.clipboard.writeText(u.join("\n")).then(function(){cb.textContent="✓ Copied!";cb.className="tb g";setTimeout(function(){us();},2000);}).catch(function(){var ta=document.createElement("textarea");ta.value=u.join("\n");ta.style.cssText="position:fixed;opacity:0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);cb.textContent="✓ Copied!";cb.className="tb g";setTimeout(function(){us();},2000);});}
function rs(){sv("vi");pr=[];sel.clear();gr.innerHTML="";pe.value="";btn.className="";btn.textContent="SEARCH";document.getElementById("ch").style.display="flex";er.className="err";}
function ex(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
</script>
</body>
</html>
